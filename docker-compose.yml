services:
  postgres:
    image: postgres:16
    container_name: translator-postgres
    environment:
      POSTGRES_USER: translator
      POSTGRES_PASSWORD: translator
      POSTGRES_DB: translator
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    ports:
      - target: 5432
        published: ${POSTGRES_PUBLISH_PORT-}
        protocol: tcp
    networks:
      - translator-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U translator -d translator"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    image: ${API_IMAGE_TAG:-translator-api:latest}
    container_name: ${API_CONTAINER_NAME:-translator}
    expose:
      - "8080"
    ports:
      - target: 8080
        published: ${API_PUBLISH_PORT-8080}
        protocol: tcp
    environment:
      PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:-change-me-docker-dev-only}
      DATABASE_URL: postgres://translator:translator@postgres:5432/translator?sslmode=disable
      DEFAULT_USERNAME: ${DEFAULT_USERNAME:-armin}
      DEFAULT_PASSWORD: ${DEFAULT_PASSWORD:-Translator@2024}
    networks:
      - translator-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    image: ${WEB_IMAGE_TAG:-translator-web:latest}
    container_name: translator-web
    expose:
      - "80"
    ports:
      - target: 80
        published: ${WEB_PUBLISH_PORT-8082}
        protocol: tcp
    environment:
      API_HOST: ${API_HOST:-translator}
      API_PORT: ${API_PORT:-8080}
    networks:
      - translator-net
    depends_on:
      - api
    restart: unless-stopped

networks:
  translator-net:
    name: ${DOCKER_NETWORK:-translator-net}
    external: true

volumes:
  postgres_data:
